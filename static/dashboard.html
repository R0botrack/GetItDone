<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Moji Seznami</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Dobrodošel, <span id="user-display"></span>!</h2>
        <button id="logout-btn">Odjava</button>
        
        <div class="input-group">
            <input type="text" id="new-list-name" placeholder="Ime novega seznama">
            <button id="add-list-btn">Ustvari</button>
        </div>

        <ul id="lists-container"></ul>
    </div>

    <script>
        const username = localStorage.getItem('username');
        if (!username) window.location.href = '/';
        
        document.getElementById('user-display').innerText = username;

        async function fetchLists() {
            const res = await fetch('/api/lists', { headers: { 'Username': username } });
            if (res.ok) {
                const lists = await res.json();
                const container = document.getElementById('lists-container');
                container.innerHTML = "";
                
                for (const [id, listData] of Object.entries(lists)) {
                    const li = document.createElement('li');
                    
                    const titleSpan = document.createElement('span');
                    titleSpan.innerText = listData.name;
                    titleSpan.className = "clickable-title";
                    titleSpan.onclick = () => window.location.href = `/view_list?id=${id}`;
                    
                    const actionsDiv = document.createElement('div');
                    actionsDiv.className = "list-actions";

                    const editBtn = document.createElement('button');
                    editBtn.innerText = "Uredi";
                    editBtn.className = "btn-secondary btn-small";
                    editBtn.onclick = () => window.location.href = `/list_view?id=${id}`;

                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerText = "Izbriši";
                    deleteBtn.className = "delete-btn btn-small";
                    deleteBtn.onclick = () => deleteList(id);
                    
                    actionsDiv.appendChild(editBtn);
                    actionsDiv.appendChild(deleteBtn);
                    
                    li.appendChild(titleSpan);
                    li.appendChild(actionsDiv);
                    container.appendChild(li);
                }
            }
        }

        async function deleteList(id) {
            await fetch(`/api/lists/${id}`, {
                method: 'DELETE',
                headers: { 'Username': username }
            });
            fetchLists();
        }

        document.getElementById('add-list-btn').addEventListener('click', async () => {
            const name = document.getElementById('new-list-name').value;
            if (!name) return;
            
            await fetch('/api/lists', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Username': username },
                body: JSON.stringify({ name })
            });
            document.getElementById('new-list-name').value = "";
            fetchLists();
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            localStorage.removeItem('username');
            window.location.href = '/';
        });

        fetchLists();
    </script>
</body>
</html>
